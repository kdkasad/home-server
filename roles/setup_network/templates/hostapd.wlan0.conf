# Generated by Claude: https://claude.ai/chat/788d6c30-3243-42d0-aec6-0547317b080a

# hostapd.conf — 2.4 GHz, WPA3-SAE, bridged
#
# Place at /etc/hostapd/hostapd.conf and point /etc/default/hostapd at it:
#   DAEMON_CONF="/etc/hostapd/hostapd.conf"

# ---- Interface / driver ----------------------------------------------------

interface=wlan0
driver=nl80211

# Bridge the AP into br0. hostapd will add wlan0 to br0 on startup.
# Do NOT also configure wlan0 in systemd-networkd as a bridge secondary —
# hostapd handles it.
bridge=br0

# ---- Regulatory ------------------------------------------------------------

# Change to your country. Without this, many channels and TX powers are
# unavailable, and 802.11d / power-constraint info won't be advertised.
country_code=US
ieee80211d=1

# ---- Basic radio / SSID ----------------------------------------------------

ssid=Kessler

# 'g' = 2.4 GHz. (Despite the name, this covers b/g/n on 2.4 GHz.)
hw_mode=g

# Channel. 1, 6, and 11 are the only non-overlapping 20 MHz channels in 2.4 GHz.
# Pick whichever is least congested in your area. Set to 0 for ACS (auto
# channel selection) — works on most modern drivers but not all.
channel=1

# Broadcast the SSID. Hiding it doesn't add real security and breaks some
# clients; leave it on.
ignore_broadcast_ssid=0

# ---- 802.11n (Wi-Fi 4) -----------------------------------------------------

# Enable HT (802.11n). Required for any reasonable throughput on modern gear.
ieee80211n=1

# HT capabilities. The set below is conservative and widely compatible:
#   [HT40+]      = use a 40 MHz channel with the secondary above primary.
#                  Only safe on channels 1-7 (with [HT40+]) or 5-11 ([HT40-]).
#                  Channel 6 + HT40+ uses 6 and 10 — fine if uncongested,
#                  but 40 MHz in 2.4 GHz is generally a bad neighbor. Remove
#                  [HT40+] if you want to stay 20 MHz only.
#   [SHORT-GI-20]/[SHORT-GI-40] = short guard interval, small throughput win.
#   [DSSS_CCK-40] = allow legacy clients on 40 MHz channels.
#ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][DSSS_CCK-40]
ht_capab=[SHORT-GI-20]

# ---- WMM / QoS -------------------------------------------------------------

# WMM is required for any HT (n) or higher rates. Leave on.
wmm_enabled=1

# ---- Security: WPA3-SAE ----------------------------------------------------

# auth_algs: 1 = Open System (correct for WPA2/WPA3-Personal; Shared Key is
# legacy WEP and should not be used).
auth_algs=1

# wpa=2 means RSN (the IE used for both WPA2 and WPA3). WPA3 is selected via
# wpa_key_mgmt=SAE below, not via this field.
wpa=2

# SAE = Simultaneous Authentication of Equals = WPA3-Personal.
wpa_key_mgmt=SAE

# CCMP (AES) only. TKIP is deprecated and disallowed with SAE anyway.
rsn_pairwise=CCMP

# 802.11w / Protected Management Frames.
#   2 = required (mandatory for WPA3-Personal).
#   1 = optional (use for WPA2/WPA3 transition).
ieee80211w=2

# The passphrase. 8-63 printable ASCII chars, or a 64-hex-digit PSK.
# Change this.
sae_password={{ secret_wifi_password }}

# Anti-clogging / SAE hardening. Enable hash-to-element (H2E), which is
# the modern, more secure SAE handshake variant. 2 = require H2E.
sae_pwe=2

# ---- Logging ---------------------------------------------------------------

# Bitfields. 0 = quiet, higher = noisier. Reasonable defaults below.
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# ---- Misc ------------------------------------------------------------------

# Disable association of clients that don't support the minimum rate set,
# i.e. force out very old 802.11b-only devices. Optional but reduces airtime
# consumed by legacy clients.
# basic_rates=60 120 240
# supported_rates=60 90 120 180 240 360 480 540

# Inactivity timeout (seconds). Default is 300. Bump if you have devices
# that go idle and get kicked.
# ap_max_inactivity=300

# Isolate clients from each other at the AP. 0 = clients can talk to each
# other through the AP. 1 = AP drops inter-client frames (useful for guest
# networks). Leave 0 for a normal home/LAN extension.
ap_isolate=1
