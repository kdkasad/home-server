---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ general.hostname }}"

- name: Set timezone
  community.general.timezone:
    name: "{{ general.timezone }}"

- name: Install unattended upgrades package
  ansible.builtin.package:
    name: unattended-upgrades
    state: present

- name: Configure unattended upgrades
  when: ansible_facts['distribution'] == "Debian" and general.auto_update_packages != "none"
  block:

    - name: Copy unattended upgrades configuration file
      ansible.builtin.template:
        src: templates/unattended-upgrades.conf
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: Restart unattended upgrades service


    - name: Enable and start unattended upgrades service
      ansible.builtin.service:
        name: unattended-upgrades
        enabled: yes
        state: started

- name: Disable unattended upgrades
  when: ansible_facts['distribution'] == "Debian" and general.auto_update_packages == "none"
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: no
    state: stopped

# Needed to get Wi-Fi card working
- name: Install kernel and iwlwifi firmware from backports
  block:
    - name: Enable non-free-firmware from backports
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/backports.list
        content: |
          deb http://deb.debian.org/debian bookworm-backports main non-free-firmware
        owner: root
        group: root
        mode: '0644'
      register: add_backports

    - name: Install kernel and iwlwifi firmware from backports
      ansible.builtin.apt:
        package:
          - linux-image-amd64
          - firmware-iwlwifi
          - firmware-intel-graphics
        default_release: bookworm-backports
        update_cache: "{{ add_backports.changed }}"
