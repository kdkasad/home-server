---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ general.hostname }}"

- name: Set timezone
  community.general.timezone:
    name: "{{ general.timezone }}"

- name: Install unattended upgrades package
  ansible.builtin.package:
    name: unattended-upgrades
    state: present

- name: Configure unattended upgrades
  when: ansible_facts['distribution'] == "Debian" and general.auto_update_packages != "none"
  block:

    - name: Copy unattended upgrades configuration file
      ansible.builtin.template:
        src: templates/unattended-upgrades.conf
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: Restart unattended upgrades service


    - name: Enable and start unattended upgrades service
      ansible.builtin.service:
        name: unattended-upgrades
        enabled: yes
        state: started

- name: Disable unattended upgrades
  when: ansible_facts['distribution'] == "Debian" and general.auto_update_packages == "none"
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: no
    state: stopped

- name: Power management
  block:
    - name: Install tools
      ansible.builtin.apt:
        name: [tlp, powertop]
        state: present
        install_recommends: false

    - name: Render TLP configuration
      ansible.builtin.template:
        src: templates/tlp.conf
        dest: /etc/tlp.conf
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: restart tlp

    - name: Enable and start power services
      ansible.builtin.service:
        name: "{{ item }}.service"
        enabled: yes
        state: started
      loop: [tlp, powertop]
